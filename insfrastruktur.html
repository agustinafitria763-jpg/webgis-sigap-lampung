<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WEBGIS INFRASTRUKTUR KRITIS</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

html,body{
    margin:0;
    padding:0;
    height:100%;
    font-family:Arial, sans-serif;
}

#map{
    width:100%;
    height:100vh;
}

.sidebar{
    position:absolute;
    top:10px;
    left:10px;
    z-index:1000;
    background:#fff;
    width:300px;
    max-height:90vh;
    overflow:auto;
    padding:15px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.3);
}

.sidebar h2{
    margin-top:0;
    color:#0d47a1;
}

.sidebar label{
    display:block;
    margin-bottom:6px;
    font-size:14px;
}

table{
    border-collapse:collapse;
    font-size:12px;
}

td{
    padding:4px;
    border-bottom:1px solid #ddd;
}

</style>
</head>

<body>

<div class="sidebar">

<h2>INFRASTRUKTUR KRITIS</h2>

<div id="layerList"></div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([-5.42,105.26],11);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
attribution:'© OpenStreetMap'
}
).addTo(map);

const loadedLayers=[];

function popupTable(props){

let html="<table>";

for(let key in props){

html += `
<tr>
<td><b>${key}</b></td>
<td>${props[key]}</td>
</tr>
`;

}

html += "</table>";

return html;

}

function addLayer(name,path,color){

fetch(path)

.then(response=>response.json())

.then(data=>{

console.log("BERHASIL:",path);

const layer=L.geoJSON(data,{

style:function(){

return{
color:color,
weight:2,
fillColor:color,
fillOpacity:0.4
};

},

pointToLayer:function(feature,latlng){

return L.circleMarker(latlng,{
radius:6,
fillColor:color,
color:"#ffffff",
weight:1,
fillOpacity:1
});

},

onEachFeature:function(feature,layer){

if(feature.properties){

layer.bindPopup(
"<h4>"+name+"</h4>"+
popupTable(feature.properties)
);

}

}

});

layer.addTo(map);

loadedLayers.push(layer);

const list=
document.getElementById("layerList");

const label=
document.createElement("label");

label.innerHTML=
`<input type="checkbox" checked> ${name}`;

list.appendChild(label);

label.querySelector("input")
.addEventListener("change",function(){

if(this.checked){

map.addLayer(layer);

}else{

map.removeLayer(layer);

}

});

})
.catch(error=>{

console.error(
"GAGAL MEMUAT:",
path,
error
);

});

}

/* =======================
   INFRASTRUKTUR KRITIS
======================= */

addLayer(
"Gardu Listrik",
"Insfratukrur kritis/GarduListrik.geojson",
"#FFD700"
);

addLayer(
"Jalan",
"Insfratukrur kritis/Jalan.geojson",
"#555555"
);

addLayer(
"Jembatan",
"Insfratukrur kritis/Jembatan.geojson",
"#8e44ad"
);

addLayer(
"Kantor PLN",
"Insfratukrur kritis/KantorPLN.geojson",
"#ffcc00"
);

addLayer(
"Klinik",
"Insfratukrur kritis/Klinik.geojson",
"#00c853"
);

addLayer(
"Menara Telepon",
"Insfratukrur kritis/MeanaraTelepon.geojson",
"#9c27b0"
);

addLayer(
"PDAM",
"Insfratukrur kritis/PDAM.geojson",
"#00b0ff"
);

addLayer(
"Pelabuhan",
"Insfratukrur kritis/Pelabuhan.geojson",
"#1565c0"
);

addLayer(
"Pemerintahan",
"Insfratukrur kritis/Pemerintahan.geojson",
"#e53935"
);

addLayer(
"Pendidikan",
"Insfratukrur kritis/Pendidikan.geojson",
"#ec407a"
);

addLayer(
"Puskesmas",
"Insfratukrur kritis/pusekesmas.geojson",
"#00897b"
);

addLayer(
"Rel Kereta Api",
"Insfratukrur kritis/RelKA.geojson",
"#616161"
);

addLayer(
"Rumah Sakit",
"Insfratukrur kritis/RumahSakit.geojson",
"#d50000"
);

addLayer(
"SPBU",
"Insfratukrur kritis/SPBU.geojson",
"#fb8c00"
);

addLayer(
"Stasiun KA",
"Insfratukrur kritis/StasiunKA.geojson",
"#1e88e5"
);

addLayer(
"Terminal Bus",
"Insfratukrur kritis/TerminalBus.geojson",
"#43a047"
);

/* zoom otomatis */

setTimeout(()=>{

if(loadedLayers.length){

const group=
L.featureGroup(loadedLayers);

try{
map.fitBounds(group.getBounds());
}catch(e){}

}

},4000);

</script>

</body>
</html>
